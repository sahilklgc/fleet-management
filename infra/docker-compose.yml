services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lgc-fleet-postgres
    environment:
      POSTGRES_DB: fleet_management
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5433:5432"
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: lgc-fleet-redis
    ports:
      - "6379:6379"
    volumes:
      - ../redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
